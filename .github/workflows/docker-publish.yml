name: Build And Push Docker Image

on:
  workflow_dispatch:
    inputs:
      dockerfile:
        description: Dockerfile variant to build
        required: true
        default: ci/docker/Dockerfile.NVIDIA
        type: choice
        options:
          - ci/docker/Dockerfile.NVIDIA
          - ci/docker/Dockerfile.AMD
      dockerhub_name:
        description: Docker Hub Username
        required: true
        default: disservin
        type: string
      image_name:
        description: Docker Hub repository name
        required: true
        default: nvidia
        type: string
      image_tag:
        description: Optional Docker tag override
        required: false
        type: string
      num_procs:
        description: Value passed to the NUM_PROCS build arg
        required: true
        default: "4"
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_repo: ${{ steps.image.outputs.image_repo }}
      variant: ${{ steps.image.outputs.variant }}
      version_tag: ${{ steps.image.outputs.version_tag }}
    steps:
      - name: Set image coordinates
        id: image
        shell: bash
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          DOCKERFILE_PATH: ${{ inputs.dockerfile }}
        run: |
          image_repo="${{ inputs.dockerhub_name }}/${IMAGE_NAME}"
          variant="$(basename "${DOCKERFILE_PATH}")"
          variant="${variant#Dockerfile.}"
          variant="$(printf '%s' "${variant}" | tr '[:upper:]' '[:lower:]')"

          if [ -n "${IMAGE_TAG}" ]; then
            version_tag="${IMAGE_TAG}"
          else
            version_tag="${variant}-${GITHUB_SHA::7}"
          fi

          {
            printf 'image_repo=%s\n' "${image_repo}"
            printf 'variant=%s\n' "${variant}"
            printf 'version_tag=%s\n' "${version_tag}"
          } >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    env:
      DOCKERFILE_PATH: ${{ inputs.dockerfile }}
      NUM_PROCS: ${{ inputs.num_procs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ inputs.dockerhub_name }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ needs.prepare.outputs.image_repo }}:${{ needs.prepare.outputs.version_tag }}-${{ matrix.arch }}
          build-args: |
            NUM_PROCS=${{ env.NUM_PROCS }}

  publish-manifest:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ inputs.dockerhub_name }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch manifest
        shell: bash
        env:
          IMAGE_REPO: ${{ needs.prepare.outputs.image_repo }}
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
          VARIANT_TAG: ${{ needs.prepare.outputs.variant }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_REPO}:${VERSION_TAG}" \
            -t "${IMAGE_REPO}:${VARIANT_TAG}" \
            "${IMAGE_REPO}:${VERSION_TAG}-amd64" \
            "${IMAGE_REPO}:${VERSION_TAG}-arm64"
